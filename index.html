<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하이드로겔 TF 프로젝트 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, push, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, updatePassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  const firebaseConfig = {
    apiKey: "AIzaSyAM5fvzsNPeOhLrCtlyTR7fAOGGs7Gx_Ao",
    authDomain: "hydrogel-tf.firebaseapp.com",
    databaseURL: "https://hydrogel-tf-default-rtdb.firebaseio.com",
    projectId: "hydrogel-tf",
    storageBucket: "hydrogel-tf.firebasestorage.app",
    messagingSenderId: "218819811814",
    appId: "1:218819811814:web:7fb93aa7f1e3c740b8de27"
  };
  try {
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    window._fb = { db, ref, onValue, set, push, remove, auth, signInWithEmailAndPassword, signOut, onAuthStateChanged, updatePassword,
      tasksRef: ref(db,"tasks"), membersRef: ref(db,"members"),
      activityRef: ref(db,"activity"), commentsRef: ref(db,"comments"),
      actionsRef: ref(db,"actions"),
      };
    window._fb_ready = true;
    if (window._fb_callback) window._fb_callback();
  } catch(e) {
    console.error("Firebase init error:", e);
    window._fb_ready = false;
  }
</script>
<style>
:root{--bg:#f5f6f8;--surface:#fff;--surface2:#f0f2f5;--border:#e2e6ea;--accent:#2563eb;--accent2:#7c3aed;--green:#059669;--yellow:#d97706;--red:#dc2626;--orange:#ea580c;--text:#111827;--text2:#4b5563;--text3:#9ca3af;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Noto Sans KR",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--surface);border-right:1px solid var(--border);z-index:100;display:flex;flex-direction:column;}
.logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);}
.logo-tag{display:inline-block;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:1px;margin-bottom:6px;}
.logo h1{font-size:14px;font-weight:700;line-height:1.3;}
.logo p{font-size:11px;color:var(--text3);margin-top:2px;}
nav{flex:1;padding:10px 0;overflow-y:auto;}
.nav-sect{padding:8px 18px 4px;font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1.5px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 18px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;border-left:2px solid transparent;}
.nav-item:hover{color:var(--text);background:var(--surface2);}
.nav-item.active{color:var(--accent);background:rgba(37,99,235,.08);border-left-color:var(--accent);}
.nav-ic{font-size:14px;width:18px;text-align:center;}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;}
.sidebar-bottom{padding:14px 18px;border-top:1px solid var(--border);}
.user-select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;padding:6px 10px;font-family:"Noto Sans KR",sans-serif;outline:none;}
.main{margin-left:220px;min-height:100vh;}
.topbar{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.97);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;gap:12px;}
.page-title{font-size:15px;font-weight:700;flex:1;}
.sync-badge{font-size:11px;padding:4px 10px;border-radius:16px;display:flex;align-items:center;gap:5px;font-family:"Space Mono",monospace;}
.sync-ok{background:rgba(5,150,105,.10);color:var(--green);border:1px solid rgba(5,150,105,.3);}
.sync-err{background:rgba(220,38,38,.10);color:var(--red);border:1px solid rgba(220,38,38,.3);}
.sync-wait{background:rgba(217,119,6,.10);color:var(--yellow);border:1px solid rgba(217,119,6,.3);}
.pulse{animation:pulse 1.2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.content{padding:24px;}
.page{display:none;}
.page.active{display:block;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;position:relative;overflow:hidden;}
.stat-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;}
.stat-card.blue::before{background:var(--accent);}
.stat-card.green::before{background:var(--green);}
.stat-card.red::before{background:var(--red);}
.stat-label{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.5px;margin-bottom:6px;}
.stat-value{font-size:28px;font-weight:900;font-family:"Space Mono",monospace;}
.stat-sub{font-size:10px;color:var(--text3);margin-top:4px;}
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px;}
.tbl-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.tbl-head h3{font-size:13px;font-weight:700;}
table{width:100%;border-collapse:collapse;}
th{background:var(--surface2);font-size:10px;font-weight:600;color:var(--text3);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);}
td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(37,99,235,.04);}
.prog-cell{display:flex;align-items:center;gap:8px;min-width:140px;}
.prog-bar-bg{flex:1;height:5px;background:#e5e7eb;border-radius:3px;overflow:hidden;}
.prog-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green),var(--accent));transition:width .3s;}
.prog-pct{font-size:10px;font-family:"Space Mono",monospace;color:var(--text3);width:28px;text-align:right;}
.prog-slider{-webkit-appearance:none;width:90px;height:5px;border-radius:3px;background:#e5e7eb;outline:none;cursor:pointer;}
.prog-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:12px;white-space:nowrap;}
.badge-blue{background:rgba(37,99,235,.10);color:var(--accent);}
.badge-green{background:rgba(5,150,105,.10);color:var(--green);}
.badge-red{background:rgba(220,38,38,.10);color:var(--red);}
.badge-gray{background:rgba(156,163,175,.20);color:var(--text3);}
.action-tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.filter-btn{padding:5px 12px;border-radius:16px;font-size:12px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s;font-family:"Noto Sans KR",sans-serif;}
.filter-btn:hover{border-color:var(--accent);color:var(--accent);}
.filter-btn.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;}
.search-inp{flex:1;max-width:220px;padding:5px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:16px;color:var(--text);font-size:12px;font-family:"Noto Sans KR",sans-serif;outline:none;}
.tl-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.tl-label{width:150px;flex-shrink:0;font-size:11px;color:var(--text2);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tl-track{flex:1;height:20px;background:var(--surface2);border-radius:10px;position:relative;min-width:300px;cursor:pointer;}
.tl-bar{position:absolute;height:100%;border-radius:10px;font-size:10px;font-weight:600;display:flex;align-items:center;padding:0 6px;overflow:hidden;white-space:nowrap;color:#fff;}
.tl-today{position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--red);z-index:2;border-radius:1px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border-left:1px solid var(--border);}
.cal-day-lbl{padding:6px;text-align:center;font-size:10px;font-weight:600;color:var(--text3);background:var(--surface2);border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
.cal-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);min-height:80px;padding:5px;}
.cal-num{font-size:11px;font-weight:500;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:3px;color:var(--text);}
.cal-today .cal-num{background:var(--accent);color:#fff;font-weight:700;}
.cal-other .cal-num{color:var(--text3);}
.cal-ev{font-size:10px;padding:2px 5px;border-radius:3px;margin-bottom:2px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;}
.member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;}
.member-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;align-items:center;gap:10px;transition:all .15s;cursor:pointer;}
.member-card:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(37,99,235,.1);}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
.act-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);align-items:baseline;}
.act-item:last-child{border-bottom:none;}
.act-who{font-size:12px;font-weight:700;white-space:nowrap;}
.act-msg{font-size:12px;color:var(--text2);flex:1;}
.act-time{font-size:10px;color:var(--text3);font-family:"Space Mono",monospace;white-space:nowrap;}
.comment{background:var(--surface2);border-radius:8px;padding:12px;margin-bottom:8px;}
.comment-hd{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.comment-who{font-size:12px;font-weight:700;}
.comment-when{font-size:10px;color:var(--text3);font-family:"Space Mono",monospace;}
.comment-task-lnk{font-size:10px;color:var(--accent);margin-left:auto;cursor:pointer;}
.comment-body{font-size:13px;color:var(--text2);line-height:1.5;}
.comment-input-wrap{display:flex;gap:8px;margin-top:12px;}
.comment-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:8px 12px;font-family:"Noto Sans KR",sans-serif;outline:none;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;padding:24px;transform:translateY(16px);transition:transform .2s;box-shadow:0 8px 32px rgba(0,0,0,.12);}
.modal-overlay.open .modal{transform:translateY(0);}
.modal h2{font-size:15px;font-weight:700;margin-bottom:18px;}
.fg{margin-bottom:12px;}
.fg label{font-size:10px;font-weight:700;color:var(--text3);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.fg input,.fg select,.fg textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:7px 11px;font-family:"Noto Sans KR",sans-serif;outline:none;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent);}
.fg textarea{resize:vertical;min-height:60px;}
.fg-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border);}
.btn{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:"Noto Sans KR",sans-serif;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#1d4ed8;}
.btn-danger{background:var(--red);color:#fff;}
.btn-danger:hover{background:#b91c1c;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--text2);color:var(--text);}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px;}
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--green);border-radius:8px;padding:10px 16px;font-size:12px;z-index:999;transform:translateY(60px);opacity:0;transition:all .25s;box-shadow:0 4px 16px rgba(0,0,0,.1);}
.toast.show{transform:translateY(0);opacity:1;}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sec-title{font-size:13px;font-weight:700;}
.month-block{margin-bottom:20px;}
.month-title{font-size:14px;font-weight:700;margin-bottom:10px;color:var(--text2);}
.empty{text-align:center;padding:32px;color:var(--text3);font-size:12px;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 50%,#7c3aed 100%);display:flex;align-items:center;justify-content:center;z-index:9999;}
.login-box{background:#fff;border-radius:16px;padding:40px;width:360px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.login-box .logo-tag{display:inline-block;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:1px;margin-bottom:8px;}
.login-box h2{font-size:18px;font-weight:700;margin-bottom:4px;}
.login-box p{font-size:12px;color:var(--text3);margin-bottom:24px;}
.login-fg{margin-bottom:14px;}
.login-fg label{font-size:11px;font-weight:600;color:var(--text2);display:block;margin-bottom:5px;}
.login-fg input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:"Noto Sans KR",sans-serif;outline:none;background:var(--surface2);color:var(--text);}
.login-fg input:focus{border-color:var(--accent);}
.login-btn{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:"Noto Sans KR",sans-serif;transition:background .15s;}
.login-btn:hover{background:#1d4ed8;}
.login-err{color:var(--red);font-size:11px;margin-bottom:10px;display:none;}
.app-wrap{display:none;}
.app-wrap.show{display:block;}
.user-info{display:flex;align-items:center;gap:8px;}
.user-info-name{font-size:12px;font-weight:700;color:var(--text);}
.user-info-email{font-size:10px;color:var(--text3);}
.pw-change-link{font-size:10px;color:var(--accent);cursor:pointer;margin-top:4px;}
.pw-change-link:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="logo-tag">HYDROGEL TF</div>
    <h2>프로젝트 관리 시스템</h2>
    <p>R&amp;I 연구소 · 로그인이 필요합니다</p>
    <div class="login-err" id="login-err"></div>
    <div class="login-fg"><label>이메일</label><input type="email" id="login-email" placeholder="example@cosmax.com"></div>
    <div class="login-fg"><label>비밀번호</label><input type="password" id="login-pw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="login-btn" onclick="doLogin()">로그인</button>
  </div>
</div>
<div class="app-wrap" id="app-wrap">
<aside class="sidebar">
  <div class="logo">
    <div class="logo-tag">HYDROGEL TF</div>
    <h1>프로젝트<br>관리 시스템</h1>
    <p>R&amp;I 연구소</p>
  </div>
  <nav>
    <div class="nav-sect">메인</div>
    <div class="nav-item active" onclick="goPage('dashboard',this)"><span class="nav-ic">📊</span>대시보드</div>
    <div class="nav-item" onclick="goPage('gantt',this)"><span class="nav-ic">📅</span>간트차트</div>
    <div class="nav-item" onclick="goPage('calendar',this)"><span class="nav-ic">🗓</span>캘린더</div>
    <div class="nav-sect">관리</div>
    <div class="nav-item" onclick="goPage('tasks',this)"><span class="nav-ic">📋</span>업무관리 <span class="nav-badge" id="nb-task">0</span></div>
    <div class="nav-item" onclick="goPage('members',this)"><span class="nav-ic">👥</span>인원정보</div>
    <div class="nav-item" onclick="goPage('actions',this)"><span class="nav-ic">🏷</span>액션아이템</div>
    <div class="nav-item" onclick="goPage('dept',this)"><span class="nav-ic">🏢</span>부서별</div>
    <div class="nav-item" onclick="goPage('person',this)"><span class="nav-ic">🙋</span>담당자별</div>
    <div class="nav-sect">팀 소통</div>
    <div class="nav-item" onclick="goPage('activity',this)"><span class="nav-ic">⚡</span>활동로그</div>
    <div class="nav-item" onclick="goPage('comments',this)"><span class="nav-ic">💬</span>댓글 <span class="nav-badge" id="nb-comment" style="display:none"></span></div>
    <div class="nav-item" onclick="goPage('monthly',this)"><span class="nav-ic">📆</span>월별현황</div>
  </nav>
  <div class="sidebar-bottom">
    <div class="user-info">
      <div style="flex:1;min-width:0">
        <div class="user-info-name" id="sidebar-user-name"></div>
        <div class="user-info-email" id="sidebar-user-email"></div>
        <div class="pw-change-link" onclick="openPwModal()">비밀번호 변경</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()" style="flex-shrink:0">로그아웃</button>
    </div>
  </div>
</aside>
<main class="main">
  <div class="topbar">
    <div class="page-title" id="ptitle">대시보드</div>
    <div class="sync-badge sync-wait" id="sync-badge"><span class="pulse">●</span> 연결 중...</div>
    <button class="btn btn-ghost btn-sm" onclick="renderAll()">↻ 새로고침</button>
    <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ 업무추가</button>
  </div>
  <div class="content">
    <div class="page active" id="pg-dashboard"></div>
    <div class="page" id="pg-gantt"></div>
    <div class="page" id="pg-calendar"></div>
    <div class="page" id="pg-tasks"></div>
    <div class="page" id="pg-members"></div>
    <div class="page" id="pg-dept"></div>
    <div class="page" id="pg-person"></div>
    <div class="page" id="pg-activity"></div>
    <div class="page" id="pg-comments"></div>
    <div class="page" id="pg-monthly"></div>
    <div class="page" id="pg-actions"></div>
  </div>
</main>
</div><!-- /app-wrap -->
<div class="modal-overlay" id="pw-modal">
  <div class="modal" style="max-width:380px">
    <h2>비밀번호 변경</h2>
    <div class="fg"><label>새 비밀번호</label><input type="password" id="pw-new" placeholder="새 비밀번호 입력"></div>
    <div class="fg"><label>새 비밀번호 확인</label><input type="password" id="pw-confirm" placeholder="새 비밀번호 다시 입력"></div>
    <div id="pw-err" style="color:var(--red);font-size:11px;margin-bottom:8px;display:none"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closePwModal()">취소</button>
      <button class="btn btn-primary" onclick="doChangePw()">변경</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">업무 입력</h2>
    <div class="fg"><label>액션아이템</label><select id="f-action"></select></div>
    <div class="fg"><label>주제</label><input id="f-topic" placeholder="예: Core protector, 필름개선"></div>

function statusBadge(t){const s=getStatus(t);if(s==="done")return'<span class="badge badge-green">완료</span>';if(s==="delay")return'<span class="badge badge-red">지연</span>';if(s==="ongoing")return'<span class="badge badge-blue">진행중</span>';return'<span class="badge badge-gray">예정</span>';}

async function updateProgress(id,val){const p=parseInt(val)/100,old=tasks[id];if(!old)return;tasks[id]={...old,progress:p};await fbSet("tasks/"+id+"/progress",p);await logActivity('"'+(old.detail||"").slice(0,20)+'" 진행률 '+parseInt(val)+"%로 업데이트");toast((old.person||"")+" 진행률 "+parseInt(val)+"%로 업데이트");}
function setSyncStatus(s){const el=document.getElementById("sync-badge");if(s==="ok"){el.className="sync-badge sync-ok";el.innerHTML="● 실시간 공유중";}else if(s==="demo"){el.className="sync-badge sync-wait";el.innerHTML="◎ 로컬 모드 (로그인 필요)";}else{el.className="sync-badge sync-err";el.innerHTML='<span class="pulse">●</span> 연결 오류 — 데이터가 최신이 아닐 수 있습니다';}}
let firebaseInitialized=false;
function initFirebase(){
  const fb=window._fb;
  if(!fb||!fb.onValue){console.warn("FB not ready");setSyncStatus("demo");return;}
  if(firebaseInitialized){console.log("Firebase 이미 연결됨, 스킵");renderAll();return;}
  firebaseInitialized=true;
  console.log("Firebase 연결 시작...");
  let connected=false;
  const connTimeout=setTimeout(()=>{if(!connected){setSyncStatus("err");}},10000);
  fb.onValue(fb.tasksRef,snap=>{
    connected=true;clearTimeout(connTimeout);
    const d=snap.val();
    if(d){tasks=d;firebaseLoaded=true;}else if(!firebaseLoaded){const o={};DT.forEach(t=>{o[t.id]=t;});fb.set(fb.tasksRef,o);firebaseLoaded=true;}
    renderAll();setSyncStatus("ok");
  },err=>{console.error("tasks listener error",err);clearTimeout(connTimeout);setSyncStatus("err");});
  let membersLoaded=false;
  fb.onValue(fb.membersRef,snap=>{
    const d=snap.val();
    if(d){members=d;membersLoaded=true;}else if(!membersLoaded){const o={};DM.forEach(m=>{o[m.id]=m;});fb.set(fb.membersRef,o);membersLoaded=true;}
    populateUserSelect();
    if(curPage==="members")renderPage("members");
  },err=>{console.error("members listener error",err);});
  fb.onValue(fb.actionsRef,snap=>{
    const d=snap.val();
    if(d){AC=d;}else{fb.set(fb.actionsRef,AC);}
    populateActionSelect();
    if(curPage==="actions")renderPage("actions");
  },err=>{console.error("actions listener error",err);});
  fb.onValue(fb.activityRef,snap=>{
    const d=snap.val();
    activity=d?(Array.isArray(d)?d:Object.values(d).reverse()):[];
    if(curPage==="activity")renderPage("activity");
  },err=>{console.error("activity listener error",err);});
  fb.onValue(fb.commentsRef,snap=>{
    const d=snap.val();comments=d||{};
    const cnt=Object.keys(comments).length;
    const nb=document.getElementById("nb-comment");
    nb.textContent=cnt;nb.style.display=cnt?"":"none";
    if(curPage==="comments")renderPage("comments");
  },err=>{console.error("comments listener error",err);});
}
async function fbSet(path,val){try{if(window._fb){await window._fb.set(window._fb.ref(window._fb.db,path),val);}}catch(e){console.error("fbSet error",e);}}
async function fbRemove(path){try{if(window._fb){await window._fb.remove(window._fb.ref(window._fb.db,path));}}catch(e){console.error("fbRemove error",e);}}
async function fbPush(path,val){try{if(window._fb){await window._fb.push(window._fb.ref(window._fb.db,path),val);}}catch(e){console.error("fbPush error",e);}}
async function logActivity(msg){const item={who:curUser,msg,time:timeStr(),ts:Date.now()};activity.unshift(item);if(activity.length>80)activity.pop();await fbPush("activity",item);}

async function doLogin(){
  const email=document.getElementById("login-email").value.trim();
  const pw=document.getElementById("login-pw").value;
  const errEl=document.getElementById("login-err");
  errEl.style.display="none";
  if(!email||!pw){errEl.textContent="이메일과 비밀번호를 입력하세요";errEl.style.display="block";return;}
  try{
    await window._fb.signInWithEmailAndPassword(window._fb.auth,email,pw);
  }catch(e){
    console.error("Login error:",e.code);
    if(e.code==="auth/invalid-credential"||e.code==="auth/wrong-password"||e.code==="auth/user-not-found")errEl.textContent="이메일 또는 비밀번호가 올바르지 않습니다";
    else if(e.code==="auth/too-many-requests")errEl.textContent="로그인 시도가 너무 많습니다. 잠시 후 다시 시도하세요";
    else errEl.textContent="로그인 실패: "+e.message;
    errEl.style.display="block";
  }
}

  }
}

function renderPerson(){const people=[...new Set(taskArr().map(t=>t.person))];document.getElementById("pg-person").innerHTML=people.map(p=>{const pt=taskArr().filter(t=>t.person===p),m=memberArr().find(x=>x.name===p)||{},c=avColor(p);return'<div class="month-block"><div class="month-title" style="display:flex;align-items:center;gap:10px"><div style="width:28px;height:28px;border-radius:50%;background:'+c+'18;color:'+c+';display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700">'+esc(p[0])+'</div>'+esc(p)+' <span style="font-size:12px;color:var(--text3);font-weight:400">'+esc(m.dept||"")+" · "+esc(m.role||"")+" · "+pt.length+"건</span></div><div class=\"tbl-wrap\"><table><thead><tr><th>액션</th><th>세부내용</th><th>시작</th><th>종료</th><th>내용</th><th>협력</th><th>진행률</th><th>상태</th></tr></thead><tbody>"+pt.map(t=>"<tr><td>"+actionTag(t.action)+"</td><td style=\"font-weight:500;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">"+esc(t.detail)+"</td><td style=\"font-size:11px;color:var(--text2)\">"+esc(t.start)+"</td><td style=\"font-size:11px;color:var(--text2)\">"+esc(t.end)+"</td><td style=\"font-size:10px;color:var(--text3)\">"+esc(t.content||"")+"</td><td style=\"font-size:10px;color:var(--text3)\">"+esc(t.collab||"-")+"</td><td>"+progressCell(t)+"</td><td>"+statusBadge(t)+"</td></tr>").join("")+"</tbody></table></div></div>";}).join("");}
function renderActivity(){document.getElementById("pg-activity").innerHTML=activity.length?'<div class="tbl-wrap" style="padding:16px">'+activity.map(a=>'<div class="act-item"><span class="act-who">'+esc(a.who)+'</span><span class="act-msg">'+esc(a.msg)+'</span><span class="act-time">'+esc(a.time)+"</span></div>").join("")+"</div>":'<div class="empty">활동 기록 없음</div>';}
function renderComments(){const arr=commentArr();const opts=taskArr().map(t=>"<option value=\""+esc(t.id)+"\">"+esc(t.detail.slice(0,35))+"</option>").join("");document.getElementById("pg-comments").innerHTML='<div class="tbl-wrap" style="padding:16px;margin-bottom:16px"><div style="font-size:12px;font-weight:700;margin-bottom:10px">댓글 작성</div><select id="cm-task" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:6px 10px;font-size:12px;font-family:Noto Sans KR,sans-serif;margin-bottom:8px;outline:none"><option value="">업무 선택 (선택사항)</option>'+opts+'</select><div class="comment-input-wrap"><input class="comment-input" id="cm-input" placeholder="팀원들과 메모를 공유하세요..." onkeydown="if(event.key===\'Enter\')addComment()"><button class="btn btn-primary" onclick="addComment()">등록</button></div></div>'+(arr.length?arr.map(c=>{const t=c.taskId?taskArr().find(x=>x.id===c.taskId):null,co=avColor(c.who);return'<div class="comment"><div class="comment-hd"><div style="width:22px;height:22px;border-radius:50%;background:'+co+'18;color:'+co+';display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700">'+esc(c.who[0])+'</div><span class="comment-who">'+esc(c.who)+'</span><span class="comment-when">'+esc(c.time)+"</span>"+(t?'<span class="comment-task-lnk" onclick="openEditModal(\''+t.id+'\')">▸ '+esc(t.detail.slice(0,25))+"</span>":"")+'</div><div class="comment-body">'+esc(c.text)+"</div></div>";}).join(""):'<div class="empty">아직 댓글이 없습니다</div>');}
async function addComment(){const text=document.getElementById("cm-input").value.trim();if(!text)return;const taskId=document.getElementById("cm-task").value||null;const c={who:curUser,text,taskId,time:timeStr(),ts:Date.now()};await fbPush("comments",c);comments["local_"+Date.now()]=c;const cnt=Object.keys(comments).length;const nb=document.getElementById("nb-comment");nb.textContent=cnt;nb.style.display="";await logActivity("댓글 작성: \""+text.slice(0,20)+"\"");document.getElementById("cm-input").value="";toast("댓글이 등록되었습니다");renderComments();}
function renderMonthly(){const mmap={};taskArr().forEach(t=>{[t.start.slice(0,7),t.end.slice(0,7)].forEach(m=>{if(!mmap[m])mmap[m]=new Set();mmap[m].add(t.id);});});document.getElementById("pg-monthly").innerHTML=Object.entries(mmap).sort().map(([ym,ids])=>{const[yr,mo]=ym.split("-");const mt=[...ids].map(id=>tasks[id]).filter(Boolean);return'<div class="month-block"><div class="month-title">'+yr+"년 "+parseInt(mo)+"월 · "+mt.length+'건</div><div class="tbl-wrap"><table><thead><tr><th>액션</th><th>세부내용</th><th>담당자</th><th>시작</th><th>종료</th><th>진행률</th><th>상태</th></tr></thead><tbody>'+mt.map(t=>"<tr><td>"+actionTag(t.action)+"</td><td style=\"font-weight:500;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">"+esc(t.detail)+"</td><td>"+esc(t.person)+"</td><td style=\"font-size:11px;color:var(--text2)\">"+esc(t.start)+"</td><td style=\"font-size:11px;color:var(--text2)\">"+esc(t.end)+"</td><td>"+progressCell(t)+"</td><td>"+statusBadge(t)+"</td></tr>").join("")+'</tbody></table></div></div>';}).join("");}
function openAddModal(){editId=null;document.getElementById("modal-title").textContent="업무 입력";document.getElementById("del-btn").style.display="none";["f-topic","f-detail","f-content","f-collab","f-note"].forEach(id=>document.getElementById(id).value="");populateActionSelect();document.getElementById("f-action").selectedIndex=0;document.getElementById("f-progress").value=0;document.getElementById("f-start").value=TODAYSTR;document.getElementById("f-end").value="";document.getElementById("f-person").innerHTML=memberArr().map(m=>"<option value=\""+esc(m.name)+"\">"+esc(m.name)+" ("+esc(m.dept)+" · "+esc(m.role)+")</option>").join("");document.getElementById("modal").classList.add("open");}
function openEditModal(id){const t=tasks[id];if(!t)return;editId=id;document.getElementById("modal-title").textContent="업무 수정";document.getElementById("del-btn").style.display="";populateActionSelect();document.getElementById("f-action").value=t.action;document.getElementById("f-topic").value=t.topic||"";document.getElementById("f-detail").value=t.detail;document.getElementById("f-start").value=t.start;document.getElementById("f-end").value=t.end;document.getElementById("f-content").value=t.content||"";document.getElementById("f-collab").value=t.collab||"";document.getElementById("f-note").value=t.note||"";document.getElementById("f-progress").value=Math.round(t.progress*100);document.getElementById("f-dept").value=t.dept||"R&I";document.getElementById("f-person").innerHTML=memberArr().map(m=>"<option value=\""+esc(m.name)+"\""+( m.name===t.person?" selected":"")+">"+esc(m.name)+" ("+esc(m.dept)+" · "+esc(m.role)+")</option>").join("");document.getElementById("modal").classList.add("open");}
function closeModal(){document.getElementById("modal").classList.remove("open");}
async function saveTask(){const action=document.getElementById("f-action").value;const topic=document.getElementById("f-topic").value.trim();const detail=document.getElementById("f-detail").value.trim();const person=document.getElementById("f-person").value;const dept=document.getElementById("f-dept").value;const start=document.getElementById("f-start").value;const end=document.getElementById("f-end").value;const content=document.getElementById("f-content").value.trim();const collab=document.getElementById("f-collab").value.trim();const note=document.getElementById("f-note").value.trim();const progress=Math.min(1,Math.max(0,(parseInt(document.getElementById("f-progress").value)||0)/100));if(!detail||!start||!end){toast("세부내용, 시작/종료일을 입력하세요",false);return;}if(editId){const u={...tasks[editId],action,topic,detail,person,dept,start,end,content,collab,note,progress};tasks[editId]=u;await fbSet("tasks/"+editId,u);await logActivity("\""+detail.slice(0,20)+"\" 수정");toast("업무가 수정되었습니다");}else{const id="t"+Date.now();const nt={id,action,topic,detail,person,dept,start,end,content,collab,note,progress};tasks[id]=nt;await fbSet("tasks/"+id,nt);await logActivity("\""+detail.slice(0,20)+"\" 업무 추가");document.getElementById("nb-task").textContent=taskArr().length;toast("업무가 추가되었습니다");}closeModal();renderAll();}
async function confirmDelete(){if(!editId)return;if(!confirm("이 업무를 삭제하시겠습니까?"))return;const detail=tasks[editId]?.detail||"";delete tasks[editId];await fbRemove("tasks/"+editId);await logActivity("\""+detail.slice(0,20)+"\" 삭제");document.getElementById("nb-task").textContent=taskArr().length;toast("삭제되었습니다");closeModal();renderAll();}
function populateUserSelect(){const sel=document.getElementById("f-person");if(!sel)return;const prev=sel.value;sel.innerHTML=memberArr().map(m=>"<option value=\""+esc(m.name)+"\""+( m.name===prev?" selected":"")+">"+esc(m.name)+" ("+esc(m.dept)+" · "+esc(m.role)+")</option>").join("");}
function populateActionSelect(){const sel=document.getElementById("f-action");if(!sel)return;const prev=sel.value;sel.innerHTML=Object.keys(AC).map(a=>"<option value=\""+esc(a)+"\""+( a===prev?" selected":"")+">"+esc(a)+"</option>").join("");if(prev&&!AC[prev]&&sel.options.length)sel.selectedIndex=0;}
let editActionName=null;
function renderActions(){const entries=Object.entries(AC);document.getElementById("pg-actions").innerHTML='<div class="sec-hd"><div class="sec-title">액션아이템 목록 ('+entries.length+'개)</div><button class="btn btn-primary btn-sm" onclick="openAddActionModal()">+ 액션아이템 추가</button></div><div class="tbl-wrap"><table><thead><tr><th>액션아이템명</th><th>색상</th><th>사용중 업무</th><th></th></tr></thead><tbody>'+(entries.length?entries.map(([name,color])=>{const cnt=taskArr().filter(t=>t.action===name).length;return'<tr><td>'+actionTag(name)+'</td><td><div style="display:flex;align-items:center;gap:6px"><div style="width:16px;height:16px;border-radius:4px;background:'+esc(color)+'"></div><span style="font-size:11px;color:var(--text3);font-family:Space Mono,monospace">'+esc(color)+'</span></div></td><td style="font-size:12px">'+cnt+'건</td><td><button class="btn btn-ghost btn-sm" onclick="openEditActionModal(\''+esc(name.replace(/'/g,"\\'"))+'\')">수정</button></td></tr>';}).join(""):'<tr><td colspan="4" class="empty">액션아이템 없음</td></tr>')+'</tbody></table></div>';}
function openAddActionModal(){editActionName=null;document.getElementById("action-modal-title").textContent="액션아이템 추가";document.getElementById("a-del-btn").style.display="none";document.getElementById("a-name").value="";document.getElementById("a-color").value="#2563eb";document.getElementById("action-modal").classList.add("open");}
function openEditActionModal(name){editActionName=name;document.getElementById("action-modal-title").textContent="액션아이템 수정";document.getElementById("a-del-btn").style.display="";document.getElementById("a-name").value=name;document.getElementById("a-color").value=AC[name]||"#888888";document.getElementById("action-modal").classList.add("open");}
function closeActionModal(){document.getElementById("action-modal").classList.remove("open");}
async function saveAction(){const name=document.getElementById("a-name").value.trim();const color=document.getElementById("a-color").value;if(!name){toast("액션아이템명을 입력하세요",false);return;}if(!editActionName&&AC[name]){toast("이미 존재하는 액션아이템입니다",false);return;}const newAC={...AC};if(editActionName&&editActionName!==name){delete newAC[editActionName];const arr=taskArr();for(const t of arr){if(t.action===editActionName){tasks[t.id]={...t,action:name};await fbSet("tasks/"+t.id+"/action",name);}}await logActivity("액션아이템 \""+editActionName+"\" → \""+name+"\" 변경");}else{await logActivity(editActionName?"액션아이템 \""+name+"\" 수정":"액션아이템 \""+name+"\" 추가");}newAC[name]=color;AC=newAC;await fbSet("actions",AC);populateActionSelect();closeActionModal();renderAll();toast(editActionName?"액션아이템이 수정되었습니다":"액션아이템이 추가되었습니다");}
async function confirmDeleteAction(){if(!editActionName)return;const cnt=taskArr().filter(t=>t.action===editActionName).length;if(cnt>0){toast(editActionName+"은(는) "+cnt+"건의 업무에서 사용중이라 삭제할 수 없습니다",false);return;}if(!confirm("\""+editActionName+"\" 액션아이템을 삭제하시겠습니까?"))return;const newAC={...AC};delete newAC[editActionName];AC=newAC;await fbSet("actions",AC);await logActivity("액션아이템 \""+editActionName+"\" 삭제");populateActionSelect();closeActionModal();renderAll();toast("액션아이템이 삭제되었습니다");}
function setAF(a){filterAction=a;renderPage(curPage);}
function setTF(t){filterTopic=t;renderPage(curPage);}
function setPF(p){filterPerson=p;renderPage(curPage);}
function setSR(v){taskSearch=v;renderPage(curPage);}
function toast(msg,ok=true){const el=document.getElementById("toast");el.textContent=msg;el.style.borderColor=ok?"var(--green)":"var(--red)";el.classList.add("show");setTimeout(()=>el.classList.remove("show"),2800);}
document.getElementById("pw-modal").addEventListener("click",e=>{if(e.target===e.currentTarget)closePwModal();});
document.getElementById("modal").addEventListener("click",e=>{if(e.target===e.currentTarget)closeModal();});
document.getElementById("member-modal").addEventListener("click",e=>{if(e.target===e.currentTarget)closeMemberModal();});
document.getElementById("action-modal").addEventListener("click",e=>{if(e.target===e.currentTarget)closeActionModal();});
</script>
</body>
</html>
