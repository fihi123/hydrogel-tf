<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하이드로겔 TF 프로젝트 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, push, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  const firebaseConfig = {
    apiKey: "AIzaSyAM5fvzsNPeOhLrCtlyTR7fAOGGs7Gx_Ao",
    authDomain: "hydrogel-tf.firebaseapp.com",
    databaseURL: "https://hydrogel-tf-default-rtdb.firebaseio.com",
    projectId: "hydrogel-tf",
    storageBucket: "hydrogel-tf.firebasestorage.app",
    messagingSenderId: "218819811814",
    appId: "1:218819811814:web:7fb93aa7f1e3c740b8de27"
  };
  try {
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    window._fb = { db, ref, onValue, set, push, remove,
      tasksRef: ref(db,"tasks"), membersRef: ref(db,"members"),
      activityRef: ref(db,"activity"), commentsRef: ref(db,"comments"),
      onlineRef: ref(db,"online") };
    window._fb_ready = true;
    if (window._fb_callback) window._fb_callback();
  } catch(e) {
    console.error("Firebase init error:", e);
    window._fb_ready = false;
  }
</script>
<style>
:root{--bg:#f5f6f8;--surface:#fff;--surface2:#f0f2f5;--border:#e2e6ea;--accent:#2563eb;--accent2:#7c3aed;--green:#059669;--yellow:#d97706;--red:#dc2626;--orange:#ea580c;--text:#111827;--text2:#4b5563;--text3:#9ca3af;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Noto Sans KR",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--surface);border-right:1px solid var(--border);z-index:100;display:flex;flex-direction:column;}
.logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);}
.logo-tag{display:inline-block;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:1px;margin-bottom:6px;}
.logo h1{font-size:14px;font-weight:700;line-height:1.3;}
.logo p{font-size:11px;color:var(--text3);margin-top:2px;}
.online-wrap{padding:10px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.online-label{font-size:10px;color:var(--text3);width:100%;margin-bottom:3px;}
.online-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;position:relative;}
.online-dot::after{content:"";position:absolute;bottom:0;right:0;width:7px;height:7px;border-radius:50%;background:var(--green);border:2px solid #fff;}
nav{flex:1;padding:10px 0;overflow-y:auto;}
.nav-sect{padding:8px 18px 4px;font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1.5px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 18px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;border-left:2px solid transparent;}
.nav-item:hover{color:var(--text);background:var(--surface2);}
.nav-item.active{color:var(--accent);background:rgba(37,99,235,.08);border-left-color:var(--accent);}
.nav-ic{font-size:14px;width:18px;text-align:center;}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;}
.sidebar-bottom{padding:14px 18px;border-top:1px solid var(--border);}
.user-select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;padding:6px 10px;font-family:"Noto Sans KR",sans-serif;outline:none;}
.main{margin-left:220px;min-height:100vh;}
.topbar{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.97);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;gap:12px;}
.page-title{font-size:15px;font-weight:700;flex:1;}
.sync-badge{font-size:11px;padding:4px 10px;border-radius:16px;display:flex;align-items:center;gap:5px;font-family:"Space Mono",monospace;}
.sync-ok{background:rgba(5,150,105,.10);color:var(--green);border:1px solid rgba(5,150,105,.3);}
.sync-err{background:rgba(220,38,38,.10);color:var(--red);border:1px solid rgba(220,38,38,.3);}
.sync-wait{background:rgba(217,119,6,.10);color:var(--yellow);border:1px solid rgba(217,119,6,.3);}
.pulse{animation:pulse 1.2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.content{padding:24px;}
.page{display:none;}
.page.active{display:block;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;position:relative;overflow:hidden;}
.stat-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;}
.stat-card.blue::before{background:var(--accent);}
.stat-card.green::before{background:var(--green);}
.stat-card.red::before{background:var(--red);}
.stat-label{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.5px;margin-bottom:6px;}
.stat-value{font-size:28px;font-weight:900;font-family:"Space Mono",monospace;}
.stat-sub{font-size:10px;color:var(--text3);margin-top:4px;}
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px;}
.tbl-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.tbl-head h3{font-size:13px;font-weight:700;}
table{width:100%;border-collapse:collapse;}
th{background:var(--surface2);font-size:10px;font-weight:600;color:var(--text3);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);}
td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(37,99,235,.04);}
.prog-cell{display:flex;align-items:center;gap:8px;min-width:140px;}
.prog-bar-bg{flex:1;height:5px;background:#e5e7eb;border-radius:3px;overflow:hidden;}
.prog-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green),var(--accent));transition:width .3s;}
.prog-pct{font-size:10px;font-family:"Space Mono",monospace;color:var(--text3);width:28px;text-align:right;}
.prog-slider{-webkit-appearance:none;width:90px;height:5px;border-radius:3px;background:#e5e7eb;outline:none;cursor:pointer;}
.prog-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:12px;white-space:nowrap;}
.badge-blue{background:rgba(37,99,235,.10);color:var(--accent);}
.badge-green{background:rgba(5,150,105,.10);color:var(--green);}
.badge-red{background:rgba(220,38,38,.10);color:var(--red);}
.badge-gray{background:rgba(156,163,175,.20);color:var(--text3);}
.action-tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.filter-btn{padding:5px 12px;border-radius:16px;font-size:12px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s;font-family:"Noto Sans KR",sans-serif;}
.filter-btn:hover{border-color:var(--accent);color:var(--accent);}
.filter-btn.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;}
.search-inp{flex:1;max-width:220px;padding:5px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:16px;color:var(--text);font-size:12px;font-family:"Noto Sans KR",sans-serif;outline:none;}
.tl-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.tl-label{width:150px;flex-shrink:0;font-size:11px;color:var(--text2);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tl-track{flex:1;height:20px;background:var(--surface2);border-radius:10px;position:relative;min-width:300px;cursor:pointer;}
.tl-bar{position:absolute;height:100%;border-radius:10px;font-size:10px;font-weight:600;display:flex;align-items:center;padding:0 6px;overflow:hidden;white-space:nowrap;color:#fff;}
.tl-today{position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--red);z-index:2;border-radius:1px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border-left:1px solid var(--border);}
.cal-day-lbl{padding:6px;text-align:center;font-size:10px;font-weight:600;color:var(--text3);background:var(--surface2);border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
.cal-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);min-height:80px;padding:5px;}
.cal-num{font-size:11px;font-weight:500;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:3px;color:var(--text);}
.cal-today .cal-num{background:var(--accent);color:#fff;font-weight:700;}
.cal-other .cal-num{color:var(--text3);}
.cal-ev{font-size:10px;padding:2px 5px;border-radius:3px;margin-bottom:2px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;}
.member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;}
.member-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;align-items:center;gap:10px;transition:all .15s;cursor:pointer;}
.member-card:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(37,99,235,.1);}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
.act-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);align-items:baseline;}
.act-item:last-child{border-bottom:none;}
.act-who{font-size:12px;font-weight:700;white-space:nowrap;}
.act-msg{font-size:12px;color:var(--text2);flex:1;}
.act-time{font-size:10px;color:var(--text3);font-family:"Space Mono",monospace;white-space:nowrap;}
.comment{background:var(--surface2);border-radius:8px;padding:12px;margin-bottom:8px;}
.comment-hd{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.comment-who{font-size:12px;font-weight:700;}
.comment-when{font-size:10px;color:var(--text3);font-family:"Space Mono",monospace;}
.comment-task-lnk{font-size:10px;color:var(--accent);margin-left:auto;cursor:pointer;}
.comment-body{font-size:13px;color:var(--text2);line-height:1.5;}
.comment-input-wrap{display:flex;gap:8px;margin-top:12px;}
.comment-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:8px 12px;font-family:"Noto Sans KR",sans-serif;outline:none;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;padding:24px;transform:translateY(16px);transition:transform .2s;box-shadow:0 8px 32px rgba(0,0,0,.12);}
.modal-overlay.open .modal{transform:translateY(0);}
.modal h2{font-size:15px;font-weight:700;margin-bottom:18px;}
.fg{margin-bottom:12px;}
.fg label{font-size:10px;font-weight:700;color:var(--text3);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.fg input,.fg select,.fg textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:7px 11px;font-family:"Noto Sans KR",sans-serif;outline:none;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent);}
.fg textarea{resize:vertical;min-height:60px;}
.fg-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border);}
.btn{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:"Noto Sans KR",sans-serif;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#1d4ed8;}
.btn-danger{background:var(--red);color:#fff;}
.btn-danger:hover{background:#b91c1c;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--text2);color:var(--text);}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px;}
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--green);border-radius:8px;padding:10px 16px;font-size:12px;z-index:999;transform:translateY(60px);opacity:0;transition:all .25s;box-shadow:0 4px 16px rgba(0,0,0,.1);}
.toast.show{transform:translateY(0);opacity:1;}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sec-title{font-size:13px;font-weight:700;}
.month-block{margin-bottom:20px;}
.month-title{font-size:14px;font-weight:700;margin-bottom:10px;color:var(--text2);}
.empty{text-align:center;padding:32px;color:var(--text3);font-size:12px;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="logo">
    <div class="logo-tag">HYDROGEL TF</div>
    <h1>프로젝트<br>관리 시스템</h1>
    <p>R&amp;I 연구소</p>
  </div>
  <div class="online-wrap" id="online-wrap"><span class="online-label">접속중인 팀원</span></div>
  <nav>
    <div class="nav-sect">메인</div>
    <div class="nav-item active" onclick="goPage('dashboard',this)"><span class="nav-ic">📊</span>대시보드</div>
    <div class="nav-item" onclick="goPage('gantt',this)"><span class="nav-ic">📅</span>간트차트</div>
    <div class="nav-item" onclick="goPage('calendar',this)"><span class="nav-ic">🗓</span>캘린더</div>
    <div class="nav-sect">관리</div>
    <div class="nav-item" onclick="goPage('tasks',this)"><span class="nav-ic">📋</span>업무관리 <span class="nav-badge" id="nb-task">0</span></div>
    <div class="nav-item" onclick="goPage('members',this)"><span class="nav-ic">👥</span>인원정보</div>
    <div class="nav-item" onclick="goPage('dept',this)"><span class="nav-ic">🏢</span>부서별</div>
    <div class="nav-item" onclick="goPage('person',this)"><span class="nav-ic">🙋</span>담당자별</div>
    <div class="nav-sect">팀 소통</div>
    <div class="nav-item" onclick="goPage('activity',this)"><span class="nav-ic">⚡</span>활동로그</div>
    <div class="nav-item" onclick="goPage('comments',this)"><span class="nav-ic">💬</span>댓글 <span class="nav-badge" id="nb-comment" style="display:none"></span></div>
    <div class="nav-item" onclick="goPage('monthly',this)"><span class="nav-ic">📆</span>월별현황</div>
  </nav>
  <div class="sidebar-bottom">
    <div style="font-size:10px;color:var(--text3);margin-bottom:5px">현재 접속자</div>
    <select class="user-select" id="user-select" onchange="changeUser(this.value)">
      <option value="">-- 선택하세요 --</option>
    </select>
  </div>
</aside>
<main class="main">
  <div class="topbar">
    <div class="page-title" id="ptitle">대시보드</div>
    <div class="sync-badge sync-wait" id="sync-badge"><span class="pulse">●</span> 연결 중...</div>
    <button class="btn btn-ghost btn-sm" onclick="renderAll()">↻ 새로고침</button>
    <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ 업무추가</button>
  </div>
  <div class="content">
    <div class="page active" id="pg-dashboard"></div>
    <div class="page" id="pg-gantt"></div>
    <div class="page" id="pg-calendar"></div>
    <div class="page" id="pg-tasks"></div>
    <div class="page" id="pg-members"></div>
    <div class="page" id="pg-dept"></div>
    <div class="page" id="pg-person"></div>
    <div class="page" id="pg-activity"></div>
    <div class="page" id="pg-comments"></div>
    <div class="page" id="pg-monthly"></div>
  </div>
</main>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">업무 입력</h2>
    <div class="fg"><label>액션아이템</label><select id="f-action"><option>리사이클</option><option>불량개선(줄불량)</option><option>불량개선(용량)</option><option>자동화</option><option>기타</option></select></div>
    <div class="fg"><label>세부내용</label><input id="f-detail" placeholder="프로젝트 세부내용"></div>
    <div class="fg-2">
      <div class="fg"><label>담당자</label><select id="f-person"></select></div>
      <div class="fg"><label>담당부서</label><select id="f-dept"><option>R&I</option><option>HG본부</option><option>AI자동화</option><option>품질</option><option>공정개발</option><option>생산</option><option>숭실대</option></select></div>
    </div>
    <div class="fg-2">
      <div class="fg"><label>시작일</label><input type="date" id="f-start" value="2026-04-13"></div>
      <div class="fg"><label>종료일</label><input type="date" id="f-end"></div>
    </div>
    <div class="fg"><label>내용/목적</label><textarea id="f-content" placeholder="업무 상세 내용"></textarea></div>
    <div class="fg-2">
      <div class="fg"><label>협력부서</label><input id="f-collab" placeholder="예: 숭실대, 품질"></div>
      <div class="fg"><label>진행률 (0~100)</label><input type="number" id="f-progress" min="0" max="100" value="0"></div>
    </div>
    <div class="fg"><label>비고</label><input id="f-note" placeholder="추가 메모"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn btn-danger" id="del-btn" style="display:none" onclick="confirmDelete()">삭제</button>
      <button class="btn btn-primary" onclick="saveTask()">저장</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="member-modal">
  <div class="modal" style="max-width:420px">
    <h2 id="member-modal-title">인원 추가</h2>
    <div class="fg"><label>성명</label><input id="m-name" placeholder="이름 입력"></div>
    <div class="fg-2">
      <div class="fg"><label>부서</label><select id="m-dept"><option>R&I</option><option>HG본부</option><option>AI자동화</option><option>품질</option><option>공정개발</option><option>생산</option><option>제조</option><option>숭실대</option></select></div>
      <div class="fg"><label>직책</label><select id="m-role"><option>본부장</option><option>랩장</option><option>팀장</option><option>파트장</option><option>책임</option><option>과장</option><option>대리</option><option>주임</option><option>연구원</option><option>마스터</option><option>교수</option></select></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeMemberModal()">취소</button>
      <button class="btn btn-danger" id="m-del-btn" style="display:none" onclick="confirmDeleteMember()">삭제</button>
      <button class="btn btn-primary" onclick="saveMember()">저장</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const TODAY=new Date(2026,3,13),TODAYSTR="2026-04-13";
let tasks={},members={},activity=[],comments={};
let curUser="김혜인",curPage="dashboard",editId=null,editMemberId=null;
let filterAction="전체",filterPerson="전체",taskSearch="";

function taskArr(){return Object.values(tasks);}

function timeStr(){const n=new Date();return(n.getMonth()+1)+"/"+n.getDate()+" "+String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0");}
function getStatus(t){const s=new Date(t.start),e=new Date(t.end);if(t.progress>=1)return"done";if(TODAY>e)return"delay";if(TODAY>=s&&TODAY<=e)return"ongoing";return"pending";}
function statusBadge(t){const s=getStatus(t);if(s==="done")return'<span class="badge badge-green">완료</span>';if(s==="delay")return'<span class="badge badge-red">지연</span>';if(s==="ongoing")return'<span class="badge badge-blue">진행중</span>';return'<span class="badge badge-gray">예정</span>';}
function actionTag(a){const c=AC[a]||"#888";return'<span class="action-tag" style="background:'+c+'20;color:'+c+'">'+a+"</span>";}
function progressCell(t){const p=Math.round(t.progress*100);return'<div class="prog-cell"><div class="prog-bar-bg"><div class="prog-bar" style="width:'+p+'%"></div></div><input type="range" class="prog-slider" min="0" max="100" value="'+p+'" oninput="this.previousElementSibling.querySelector(\'.prog-bar\').style.width=this.value+\'%\';this.nextElementSibling.textContent=this.value+\'%\'" onchange="updateProgress(\''+t.id+'\',this.value)"><span class="prog-pct">'+p+'%</span></div>';}
async function updateProgress(id,val){const p=parseInt(val)/100,old=tasks[id];if(!old)return;tasks[id]={...old,progress:p};await fbSet("tasks/"+id+"/progress",p);await logActivity('"'+(old.detail||"").slice(0,20)+'" 진행률 '+parseInt(val)+"%로 업데이트");toast((old.person||"")+" 진행률 "+parseInt(val)+"%로 업데이트");}
function setSyncStatus(s){const el=document.getElementById("sync-badge");if(s==="ok"){el.className="sync-badge sync-ok";el.innerHTML="● 실시간 공유중";}else if(s==="demo"){el.className="sync-badge sync-wait";el.innerHTML="◎ 로컬 모드";}else{el.className="sync-badge sync-err";el.innerHTML='<span class="pulse">●</span> 연결 오류';}}
function initFirebase(){
  const fb=window._fb;
  if(!fb||!fb.onValue){console.warn("FB not ready");setSyncStatus("demo");return;}
  console.log("Firebase 연결 시작...");
  let connected=false;
  const connTimeout=setTimeout(()=>{if(!connected){setSyncStatus("err");}},10000);
  fb.onValue(fb.tasksRef,snap=>{
    connected=true;clearTimeout(connTimeout);
    const d=snap.val();
    if(d){tasks=d;}else{const o={};DT.forEach(t=>{o[t.id]=t;});fb.set(fb.tasksRef,o);}
    renderAll();setSyncStatus("ok");
  },err=>{console.error("tasks listener error",err);clearTimeout(connTimeout);setSyncStatus("err");});
  fb.onValue(fb.membersRef,snap=>{
    const d=snap.val();
    if(d){members=d;}else{const o={};DM.forEach(m=>{o[m.id]=m;});fb.set(fb.membersRef,o);}
    populateUserSelect();
    if(curPage==="members")renderPage("members");
  },err=>{console.error("members listener error",err);});
  fb.onValue(fb.activityRef,snap=>{
    const d=snap.val();
    activity=d?(Array.isArray(d)?d:Object.values(d).reverse()):[];
    if(curPage==="activity")renderPage("activity");
  },err=>{console.error("activity listener error",err);});
  fb.onValue(fb.commentsRef,snap=>{
    const d=snap.val();comments=d||{};
    const cnt=Object.keys(comments).length;
    const nb=document.getElementById("nb-comment");
    nb.textContent=cnt;nb.style.display=cnt?"":"none";
    if(curPage==="comments")renderPage("comments");
  },err=>{console.error("comments listener error",err);});
  fb.onValue(fb.onlineRef,snap=>{onlineUsers=snap.val()||{};renderOnline();},err=>{console.error("online listener error",err);});
  fb.set(fb.ref(fb.db,"online/"+curUser.replace(/\s/g,"_")),{name:curUser,ts:Date.now()});
}
async function fbSet(path,val){try{if(window._fb){await window._fb.set(window._fb.ref(window._fb.db,path),val);}}catch(e){console.error("fbSet error",e);}}
async function fbRemove(path){try{if(window._fb){await window._fb.remove(window._fb.ref(window._fb.db,path));}}catch(e){console.error("fbRemove error",e);}}
async function fbPush(path,val){try{if(window._fb){await window._fb.push(window._fb.ref(window._fb.db,path),val);}}catch(e){console.error("fbPush error",e);}}
async function logActivity(msg){const item={who:curUser,msg,time:timeStr(),ts:Date.now()};activity.unshift(item);if(activity.length>80)activity.pop();await fbPush("activity",item);}
function startApp(){
  DT.forEach(t=>{tasks[t.id]=t;});
  DM.forEach(m=>{members[m.id]=m;});
  setSyncStatus("demo");
  populateUserSelect();
  renderAll();
  // Firebase 모듈이 로드되면 즉시 연결, 아직이면 콜백 등록
  if(window._fb_ready && window._fb){
    initFirebase();
  } else {
    window._fb_callback = ()=>{ if(window._fb) initFirebase(); };
    // 폴링 백업 (콜백 놓친 경우)
    let tries=0;
    const poll=setInterval(()=>{
      if(window._fb){clearInterval(poll);initFirebase();}
      if(++tries>20){clearInterval(poll);setSyncStatus("err");}
    },500);
  }
}

="tbl-wrap" style="padding:16px"><div class="sec-title" style="margin-bottom:12px">액션아이템 분포</div>'+Object.entries(amap).map(([k,v])=>'<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="width:8px;height:8px;border-radius:50%;background:'+(AC[k]||"#888")+';flex-shrink:0"></div><div style="font-size:12px;flex:1">'+k+'</div><div style="height:4px;width:80px;background:#e5e7eb;border-radius:2px;overflow:hidden"><div style="height:100%;background:'+(AC[k]||"#888")+';width:'+(v/arr.length*100)+'%"></div></div><span style="font-size:11px;color:var(--text3)">'+v+"</span></div>").join("")+'<div style="margin-top:14px"><div class="sec-title" style="margin-bottom:8px">최근 활동</div>'+( activity.slice(0,4).map(a=>'<div style="font-size:11px;color:var(--text2);padding:4px 0;border-bottom:1px solid var(--border)"><strong style="color:var(--text)">'+a.who+"</strong> "+a.msg+'<span style="color:var(--text3);float:right">'+a.time+"</span></div>").join("")||'<div style="font-size:11px;color:var(--text3)">활동 없음</div>')+'</div></div></div><div class="sec-hd"><div class="sec-title">진행중/지연 업무 ('+ active.length+'건)</div></div><div class="tbl-wrap"><table><thead><tr><th>액션</th><th>세부내용</th><th>담당자</th><th>종료일</th><th>진행률</th><th>상태</th></tr></thead><tbody>'+(active.length?active.map(t=>'<tr><td>'+actionTag(t.action)+'</td><td style="max-width:200px"><div style="font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+t.detail+'</div><div style="font-size:10px;color:var(--text3)">'+t.content+'</div></td><td><div style="display:flex;align-items:center;gap:6px"><div style="width:22px;height:22px;border-radius:50%;background:'+avColor(t.person)+';display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff">'+t.person[0]+'</div>'+t.person+'</div></td><td style="font-size:11px;color:var(--text2)">'+t.end+"</td><td>"+progressCell(t)+"</td><td>"+statusBadge(t)+"</td></tr>").join(""):'<tr><td colspan="6" class="empty">진행중인 업무 없음</td></tr>')+'</tbody></table></div>';}
function renderGantt(){const arr=taskArr();const acts=["전체",...new Set(arr.map(t=>t.action))];const ppl=["전체",...new Set(arr.map(t=>t.person))];const filtered=arr.filter(t=>(filterAction==="전체"||t.action===filterAction)&&(filterPerson==="전체"||t.person===filterPerson)&&(!taskSearch||t.detail.includes(taskSearch)||t.person.includes(taskSearch)));const allD=filtered.flatMap(t=>[new Date(t.start),new Date(t.end)]);const minD=allD.length?new Date(Math.min(...allD)):new Date(2026,3,1);const maxD=allD.length?new Date(Math.max(...allD)):new Date(2026,6,30);minD.setDate(minD.getDate()-5);maxD.setDate(maxD.getDate()+5);const span=maxD-minD;const todayPct=Math.max(0,Math.min(100,(TODAY-minD)/span*100));document.getElementById("pg-gantt").innerHTML='<div class="filter-bar">'+acts.map(a=>'<button class="filter-btn '+(filterAction===a?"on":"")+'" onclick="setAF(\''+a+'\')">'+ a+"</button>").join("")+'<span style="color:var(--border);font-size:16px;padding:0 4px">|</span>'+ppl.map(p=>'<button class="filter-btn '+(filterPerson===p?"on":"")+'" onclick="setPF(\''+p+'\')">'+ p+"</button>").join("")+'<input class="search-inp" style="margin-left:auto" placeholder="검색..." value="'+taskSearch+'" oninput="setSR(this.value)"></div><div class="tbl-wrap" style="padding:16px;overflow-x:auto"><div style="min-width:500px">'+filtered.map(t=>{const s=new Date(t.start),e=new Date(t.end);const left=(s-minD)/span*100,width=Math.max(1,(e-s)/span*100);const st=getStatus(t);const bc=st==="done"?"#1D9E75":st==="delay"?"#E24B4A":st==="ongoing"?"#2563eb":"#9ca3af";return'<div class="tl-row"><div class="tl-label" title="'+ t.person+": "+t.detail+'">'+ t.person+": "+(t.detail.length>18?t.detail.slice(0,16)+"…":t.detail)+'</div><div class="tl-track" onclick="openEditModal(\''+t.id+'\')"><div class="tl-today" style="left:'+todayPct+'%"></div><div class="tl-bar" style="left:'+left+"%;width:"+width+"%;background:"+bc+'">'+(width>8?t.detail.slice(0,12):"")+'</div></div></div>';}).join("")+(!filtered.length?'<div class="empty">해당 조건의 업무 없음</div>':"")+'</div></div>';}
function renderCal(){const first=new Date(calY,calM-1,1).getDay(),days=new Date(calY,calM,0).getDate();let h='<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><button class="btn btn-ghost btn-sm" onclick="calNav(-1)">◀</button><span style="font-size:15px;font-weight:700">'+calY+"년 "+calM+'월</span><button class="btn btn-ghost btn-sm" onclick="calNav(1)">▶</button><button class="btn btn-ghost btn-sm" onclick="calNav(0)">오늘</button></div><div class="tbl-wrap" style="overflow:hidden"><div class="cal-grid">'+["일","월","화","수","목","금","토"].map(d=>'<div class="cal-day-lbl">'+d+"</div>").join("")+Array(first).fill('<div class="cal-cell cal-other"><div class="cal-num"></div></div>').join("");for(let d=1;d<=days;d++){const ds=calY+"-"+String(calM).padStart(2,"0")+"-"+String(d).padStart(2,"0");const isTd=calY===2026&&calM===4&&d===13;const dt=taskArr().filter(t=>ds>=t.start&&ds<=t.end);h+='<div class="cal-cell'+(isTd?" cal-today":"")+'"><div class="cal-num">'+d+"</div>"+dt.slice(0,3).map(t=>'<div class="cal-ev" style="background:'+(AC[t.action]||"#888")+"20;color:"+(AC[t.action]||"#888")+'" onclick="openEditModal(\''+t.id+'\')">'+ t.person+": "+t.detail.slice(0,10)+"</div>").join("")+(dt.length>3?'<div style="font-size:9px;color:var(--text3)">+'+(dt.length-3)+"건</div>":"")+'</div>';}document.getElementById("pg-calendar").innerHTML=h+'</div></div>';}
function calNav(d){if(d===0){calY=2026;calM=4;}else{calM+=d;if(calM>12){calM=1;calY++;}if(calM<1){calM=12;calY--;}}renderCal();}
function renderTasks(){const arr=taskArr();const acts=["전체",...new Set(arr.map(t=>t.action))];const ppl=["전체",...new Set(arr.map(t=>t.person))];const filtered=arr.filter(t=>(filterAction==="전체"||t.action===filterAction)&&(filterPerson==="전체"||t.person===filterPerson)&&(!taskSearch||t.detail.includes(taskSearch)||t.person.includes(taskSearch)||t.action.includes(taskSearch)));document.getElementById("pg-tasks").innerHTML='<div class="filter-bar">'+acts.map(a=>'<button class="filter-btn '+(filterAction===a?"on":"")+'" onclick="setAF(\''+a+'\')">'+ a+"</button>").join("")+'<span style="color:var(--border);font-size:16px;padding:0 4px">|</span>'+ppl.map(p=>'<button class="filter-btn '+(filterPerson===p?"on":"")+'" onclick="setPF(\''+p+'\')">'+ p+"</button>").join("")+'<input class="search-inp" style="margin-left:auto" placeholder="검색..." value="'+taskSearch+'" oninput="setSR(this.value)"></div><div class="tbl-wrap"><div class="tbl-head"><h3>업무 목록 ('+ filtered.length+'건)</h3></div><table><thead><tr><th>액션</th><th>세부내용</th><th>담당자</th><th>시작</th><th>종료</th><th>협력</th><th>진행률</th><th>상태</th><th></th></tr></thead><tbody>'+(filtered.length?filtered.map(t=>'<tr><td>'+actionTag(t.action)+"</td><td style=\"max-width:180px\"><div style=\"font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">"+t.detail+"</div><div style=\"font-size:10px;color:var(--text3)\">"+t.content+"</div></td><td><div style=\"display:flex;align-items:center;gap:5px\"><div style=\"width:20px;height:20px;border-radius:50%;background:"+avColor(t.person)+";display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff\">"+t.person[0]+"</div>"+t.person+"</div></td><td style=\"font-size:11px;color:var(--text2)\">"+t.start+"</td><td style=\"font-size:11px;color:var(--text2)\">"+t.end+"</td><td style=\"font-size:10px;color:var(--text3)\">"+(t.collab||"-")+"</td><td>"+progressCell(t)+"</td><td>"+statusBadge(t)+"</td><td><button class=\"btn btn-ghost btn-sm\" onclick=\"openEditModal('"+t.id+"')\">"+"수정</button></td></tr>").join(""):'<tr><td colspan="9" class="empty">업무 없음</td></tr>')+'</tbody></table></div>';}
function renderMembers(){const arr=memberArr();document.getElementById("pg-members").innerHTML='<div class="sec-hd"><div class="sec-title">TF 인원 현황 ('+ arr.length+'명)</div><button class="btn btn-primary btn-sm" onclick="openAddMemberModal()">+ 인원 추가</button></div><div class="member-grid">'+ arr.map(m=>{const tc=taskArr().filter(t=>t.person===m.name).length;const c=avColor(m.name);return'<div class="member-card" onclick="openEditMemberModal(\''+m.id+'\')"><div class="avatar" style="background:'+c+'18;color:'+c+'">'+m.name[0]+'</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700">'+m.name+'</div><div style="font-size:11px;color:var(--text2)">'+m.dept+" · "+m.role+"</div>"+(tc?'<div style="font-size:11px;color:var(--accent);margin-top:2px">'+tc+"건 담당</div>":"")+'</div><div style="font-size:11px;color:var(--text3)">✏️</div></div>';}).join("")+"</div>";}
function openAddMemberModal(){editMemberId=null;document.getElementById("member-modal-title").textContent="인원 추가";document.getElementById("m-del-btn").style.display="none";document.getElementById("m-name").value="";document.getElementById("m-dept").value="R&I";document.getElementById("m-role").value="연구원";document.getElementById("member-modal").classList.add("open");}
function openEditMemberModal(id){const m=members[id];if(!m)return;editMemberId=id;document.getElementById("member-modal-title").textContent="인원 수정";document.getElementById("m-del-btn").style.display="";document.getElementById("m-name").value=m.name;document.getElementById("m-dept").value=m.dept;document.getElementById("m-role").value=m.role;document.getElementById("member-modal").classList.add("open");}
function closeMemberModal(){document.getElementById("member-modal").classList.remove("open");}
async function saveMember(){const name=document.getElementById("m-name").value.trim();const dept=document.getElementById("m-dept").value;const role=document.getElementById("m-role").value;if(!name){toast("이름을 입력하세요",false);return;}if(editMemberId){const u={...members[editMemberId],name,dept,role};members[editMemberId]=u;await fbSet("members/"+editMemberId,u);await logActivity("인원 수정: "+name+" ("+dept+" "+role+")");toast(name+"님 정보가 수정되었습니다");}else{const id="m"+Date.now();const nm={id,name,dept,role};members[id]=nm;await fbSet("members/"+id,nm);await logActivity("인원 추가: "+name+" ("+dept+" "+role+")");toast(name+"님이 추가되었습니다");}closeMemberModal();populateUserSelect();renderMembers();}
async function confirmDeleteMember(){const m=members[editMemberId];if(!m)return;if(!confirm(m.name+"님을 삭제하시겠습니까?"))return;delete members[editMemberId];await fbRemove("members/"+editMemberId);await logActivity("인원 삭제: "+m.name);toast(m.name+"님이 삭제되었습니다");closeMemberModal();populateUserSelect();renderMembers();}
function renderDept(){const depts=[...new Set(taskArr().map(t=>t.dept))];document.getElementById("pg-dept").innerHTML=depts.map(d=>{const dt=taskArr().filter(t=>t.dept===d),c=DC[d]||"#888";return'<div class="month-block"><div class="month-title" style="display:flex;align-items:center;gap:8px"><div style="width:8px;height:8px;border-radius:50%;background:'+c+'"></div>'+d+" ("+dt.length+'건)</div><div class="tbl-wrap"><table><thead><tr><th>액션</th><th>세부내용</th><th>담당자</th><th>시작</th><th>종료</th><th>진행률</th><th>상태</th></tr></thead><tbody>'+dt.map(t=>'<tr><td>'+actionTag(t.action)+"</td><td style=\"font-weight:500;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">"+t.detail+"</td><td>"+t.person+"</td><td style=\"font-size:11px;color:var(--text2)\">"+t.start+"</td><td style=\"font-size:11px;color:var(--text2)\">"+t.end+"</td><td>"+progressCell(t)+"</td><td>"+statusBadge(t)+"</td></tr>").join("")+'</tbody></table></div></div>';}).join("");}
function renderPerson(){const people=[...new Set(taskArr().map(t=>t.person))];document.getElementById("pg-person").innerHTML=people.map(p=>{const pt=taskArr().filter(t=>t.person===p),m=memberArr().find(x=>x.name===p)||{},c=avColor(p);return'<div class="month-block"><div class="month-title" style="display:flex;align-items:center;gap:10px"><div style="width:28px;height:28px;border-radius:50%;background:'+c+'18;color:'+c+';display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700">'+p[0]+'</div>'+p+' <span style="font-size:12px;color:var(--text3);font-weight:400">'+(m.dept||"")+" · "+(m.role||"")+" · "+pt.length+"건</span></div><div class=\"tbl-wrap\"><table><thead><tr><th>액션</th><th>세부내용</th><th>시작</th><th>종료</th><th>내용</th><th>협력</th><th>진행률</th><th>상태</th></tr></thead><tbody>"+pt.map(t=>"<tr><td>"+actionTag(t.action)+"</td><td style=\"font-weight:500;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">"+t.detail+"</td><td style=\"font-size:11px;color:var(--text2)\">"+t.start+"</td><td style=\"font-size:11px;color:var(--text2)\">"+t.end+"</td><td style=\"font-size:10px;color:var(--text3)\">"+( t.content||"")+"</td><td style=\"font-size:10px;color:var(--text3)\">"+( t.collab||"-")+"</td><td>"+progressCell(t)+"</td><td>"+statusBadge(t)+"</td></tr>").join("")+"</tbody></table></div></div>";}).join("");}
function renderActivity(){document.getElementById("pg-activity").innerHTML=activity.length?'<div class="tbl-wrap" style="padding:16px">'+activity.map(a=>'<div class="act-item"><span class="act-who">'+a.who+'</span><span class="act-msg">'+a.msg+'</span><span class="act-time">'+a.time+"</span></div>").join("")+"</div>":'<div class="empty">활동 기록 없음</div>';}
function renderComments(){const arr=commentArr();const opts=taskArr().map(t=>"<option value=\""+t.id+"\">"+t.detail.slice(0,35)+"</option>").join("");document.getElementById("pg-comments").innerHTML='<div class="tbl-wrap" style="padding:16px;margin-bottom:16px"><div style="font-size:12px;font-weight:700;margin-bottom:10px">댓글 작성</div><select id="cm-task" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:6px 10px;font-size:12px;font-family:Noto Sans KR,sans-serif;margin-bottom:8px;outline:none"><option value="">업무 선택 (선택사항)</option>'+opts+'</select><div class="comment-input-wrap"><input class="comment-input" id="cm-input" placeholder="팀원들과 메모를 공유하세요..." onkeydown="if(event.key===\'Enter\')addComment()"><button class="btn btn-primary" onclick="addComment()">등록</button></div></div>'+(arr.length?arr.map(c=>{const t=c.taskId?taskArr().find(x=>x.id===c.taskId):null,co=avColor(c.who);return'<div class="comment"><div class="comment-hd"><div style="width:22px;height:22px;border-radius:50%;background:'+co+'18;color:'+co+';display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700">'+c.who[0]+'</div><span class="comment-who">'+c.who+'</span><span class="comment-when">'+c.time+"</span>"+(t?'<span class="comment-task-lnk" onclick="openEditModal(\''+t.id+'\')">▸ '+t.detail.slice(0,25)+"</span>":"")+'</div><div class="comment-body">'+c.text+"</div></div>";}).join(""):'<div class="empty">아직 댓글이 없습니다</div>');}
async function addComment(){const text=document.getElementById("cm-input").value.trim();if(!text)return;const taskId=document.getElementById("cm-task").value||null;const c={who:curUser,text,taskId,time:timeStr(),ts:Date.now()};await fbPush("comments",c);comments["local_"+Date.now()]=c;const cnt=Object.keys(comments).length;const nb=document.getElementById("nb-comment");nb.textContent=cnt;nb.style.display="";await logActivity("댓글 작성: \""+text.slice(0,20)+"\"");document.getElementById("cm-input").value="";toast("댓글이 등록되었습니다");renderComments();}
function renderMonthly(){const mmap={};taskArr().forEach(t=>{[t.start.slice(0,7),t.end.slice(0,7)].forEach(m=>{if(!mmap[m])mmap[m]=new Set();mmap[m].add(t.id);});});document.getElementById("pg-monthly").innerHTML=Object.entries(mmap).sort().map(([ym,ids])=>{const[yr,mo]=ym.split("-");const mt=[...ids].map(id=>tasks[id]).filter(Boolean);return'<div class="month-block"><div class="month-title">'+yr+"년 "+parseInt(mo)+"월 · "+mt.length+'건</div><div class="tbl-wrap"><table><thead><tr><th>액션</th><th>세부내용</th><th>담당자</th><th>시작</th><th>종료</th><th>진행률</th><th>상태</th></tr></thead><tbody>'+mt.map(t=>"<tr><td>"+actionTag(t.action)+"</td><td style=\"font-weight:500;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">"+t.detail+"</td><td>"+t.person+"</td><td style=\"font-size:11px;color:var(--text2)\">"+t.start+"</td><td style=\"font-size:11px;color:var(--text2)\">"+t.end+"</td><td>"+progressCell(t)+"</td><td>"+statusBadge(t)+"</td></tr>").join("")+'</tbody></table></div></div>';}).join("");}
function openAddModal(){editId=null;document.getElementById("modal-title").textContent="업무 입력";document.getElementById("del-btn").style.display="none";["f-detail","f-content","f-collab","f-note"].forEach(id=>document.getElementById(id).value="");document.getElementById("f-action").value="리사이클";document.getElementById("f-progress").value=0;document.getElementById("f-start").value=TODAYSTR;document.getElementById("f-end").value="";document.getElementById("f-person").innerHTML=memberArr().map(m=>"<option value=\""+m.name+"\">"+m.name+" ("+m.dept+" · "+m.role+")</option>").join("");document.getElementById("modal").classList.add("open");}
function openEditModal(id){const t=tasks[id];if(!t)return;editId=id;document.getElementById("modal-title").textContent="업무 수정";document.getElementById("del-btn").style.display="";document.getElementById("f-action").value=t.action;document.getElementById("f-detail").value=t.detail;document.getElementById("f-start").value=t.start;document.getElementById("f-end").value=t.end;document.getElementById("f-content").value=t.content||"";document.getElementById("f-collab").value=t.collab||"";document.getElementById("f-note").value=t.note||"";document.getElementById("f-progress").value=Math.round(t.progress*100);document.getElementById("f-dept").value=t.dept||"R&I";document.getElementById("f-person").innerHTML=memberArr().map(m=>"<option value=\""+m.name+"\""+( m.name===t.person?" selected":"")+">"+m.name+" ("+m.dept+" · "+m.role+")</option>").join("");document.getElementById("modal").classList.add("open");}
function closeModal(){document.getElementById("modal").classList.remove("open");}
async function saveTask(){const action=document.getElementById("f-action").value;const detail=document.getElementById("f-detail").value.trim();const person=document.getElementById("f-person").value;const dept=document.getElementById("f-dept").value;const start=document.getElementById("f-start").value;const end=document.getElementById("f-end").value;const content=document.getElementById("f-content").value.trim();const collab=document.getElementById("f-collab").value.trim();const note=document.getElementById("f-note").value.trim();const progress=Math.min(1,Math.max(0,(parseInt(document.getElementById("f-progress").value)||0)/100));if(!detail||!start||!end){toast("세부내용, 시작/종료일을 입력하세요",false);return;}if(editId){const u={...tasks[editId],action,detail,person,dept,start,end,content,collab,note,progress};tasks[editId]=u;await fbSet("tasks/"+editId,u);await logActivity("\""+detail.slice(0,20)+"\" 수정");toast("업무가 수정되었습니다");}else{const id="t"+Date.now();const nt={id,action,detail,person,dept,start,end,content,collab,note,progress};tasks[id]=nt;await fbSet("tasks/"+id,nt);await logActivity("\""+detail.slice(0,20)+"\" 업무 추가");document.getElementById("nb-task").textContent=taskArr().length;toast("업무가 추가되었습니다");}closeModal();renderAll();}
async function confirmDelete(){if(!editId)return;if(!confirm("이 업무를 삭제하시겠습니까?"))return;const detail=tasks[editId]?.detail||"";delete tasks[editId];await fbRemove("tasks/"+editId);await logActivity("\""+detail.slice(0,20)+"\" 삭제");document.getElementById("nb-task").textContent=taskArr().length;toast("삭제되었습니다");closeModal();renderAll();}
function setAF(a){filterAction=a;renderPage(curPage);}
function setPF(p){filterPerson=p;renderPage(curPage);}
function setSR(v){taskSearch=v;renderPage(curPage);}
function toast(msg,ok=true){const el=document.getElementById("toast");el.textContent=msg;el.style.borderColor=ok?"var(--green)":"var(--red)";el.classList.add("show");setTimeout(()=>el.classList.remove("show"),2800);}
document.getElementById("modal").addEventListener("click",e=>{if(e.target===e.currentTarget)closeModal();});
document.getElementById("member-modal").addEventListener("click",e=>{if(e.target===e.currentTarget)closeMemberModal();});
</script>
